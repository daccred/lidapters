# deploy_pins.toml — canonical Blend deploy-ledger pins.
#
# A contract's "deploy ledger" is the ledger its instance was created in. It is
# IMMUTABLE. The relay pins it to floor the in-process fold low enough to capture
# the contract's bootstrap Sets (reserve-config + initial oracle prices).
#
# This file is canonical, hand-curated data — the single source of truth. Treat
# it as such: every `deploy_ledger` must be a verified value, ESPECIALLY for
# mainnet (public). Do NOT guess. Derive candidates with the scratchpad tool
# `scratchpad/deploy-ledger/deploy-ledger.sh`, then hand-curate the result here.
#
# Omit `deploy_ledger` for an uncurated row — the loader reports it as (0, false).
#
# Schema (one [[pin]] table per contract):
#   network        "testnet" | "public"
#   contract_id    Stellar contract id (C...)
#   role           "pool" | "oracle" | "backstop"
#   deploy_ledger  int; OMIT if uncurated
#   source         where the value came from
#   notes          free text

