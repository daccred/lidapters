# deployments.toml — canonical Blend deploy-ledger pins.
#
# A contract's "deploy ledger" is the ledger its instance was created in. It is
# IMMUTABLE. The relay pins it to floor the in-process fold low enough to capture
# the contract's bootstrap Sets (reserve-config + initial oracle prices).
#
# This file is canonical, hand-curated data — the single source of truth. Treat
# it as such: every `deploy_ledger` must be a verified value, ESPECIALLY for
# mainnet (public). Do NOT guess. Derive candidates with the scratchpad tool
# `scratchpad/deploy-ledger/deploy-ledger.sh`, then hand-curate the result here.
#
# Omit `deploy_ledger` for an uncurated row — the loader reports it as (0, false).
#
# Schema (one [[pin]] table per contract):
#   network        "testnet" | "public"
#   contract_id    Stellar contract id (C...)
#   role           "pool" | "oracle" | "backstop"
#   deploy_ledger  int; OMIT if uncurated
#   source         where the value came from
#   notes          free text

# --- testnet (verified — exact create_contract ledgers) --------------------
# The floor MUST be the create_contract ledger: the oracle INSTANCE entry
# (asset->price-index) is written at deploy and is not re-emitted later. Flooring
# at the old SHELLBOOK approximation 3294000 would miss that Set on a cold
# backfill -> null HF/USD. Pin the exact create ledgers instead.

[[pin]]
network = "testnet"
contract_id = "CANNO5MLDIANFGZBIFUAYLY2GZLMJOVQKIGBEGWYWQRCRR3QYKEKJAXU"
role = "pool"
deploy_ledger = 3289010
source = "stellar.expert exact close-time match (HIGH); create_contract ledger"
notes = "Blend testnet pool, deploy 2026-06-26 07:32:58 UTC. Exact create_contract ledger 3289010 (replaces the 3294000 SHELLBOOK bootstrap approximation). Create-ledger is the correct fold floor because the instance entry is written at deploy and never re-emitted."

[[pin]]
network = "testnet"
contract_id = "CCSXSQDUZLCRIGRWLCYK3F547PLBGSFTUVJRQCIXRO2ZDI3VIZKN3NH2"
role = "oracle"
deploy_ledger = 3288990
source = "stellar.expert exact close-time match (HIGH); create_contract ledger"
notes = "Blend testnet oracle, deploy 2026-06-26 07:31:18 UTC. Exact create_contract ledger 3288990 (replaces the 3294000 SHELLBOOK bootstrap approximation). The oracle instance (asset->index) is written here and not re-emitted at 3294000, so 3288990 is the correct floor to avoid null HF."

